<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Assignment 3 For the G.O.A.T (great of all time) Patrick Guichon.
    </title>
    <link rel="stylesheet" href="style.css" />
    <!-- import jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  </head>

  <body>
    <header>
      <div id="textinfo">
        <h2 id="numTotal">Total number of pairs: 0</h2>
        <h2 id="numClicks">Number of Clicks: 0</h2>
        <h2 id="numMatched">Number of Pairs Matches: 0</h2>
        <h2 id="numNotMatched">Number of Pairs left: 0</h2>
        <h2 id="timer">Total time: 0 seconds. 0 seconds have passed.</h2>
      </div>
      <div id="options_button">
        <div id="difficulty">
          <button id="easy">Easy</button>
          <button id="medium">Medium</button>
          <button id="hard">Hard</button>
        </div>
        <div>
          <button id="restart">Reset</button>
          <button id="start">Start!</button>
        </div>
      </div>
    </header>

    <div id="game_grid"></div>
    <button id="theme">Darkmode</button>
    <script src="gameLogic.js"></script>
  </body>
</html>
